# ================================================================
# Just Ask — Render Blueprint (Infrastructure as Code)
# ================================================================
# Deploy with: Connect repo to Render → Auto-detects render.yaml
# ================================================================

services:
  # ── Backend API ─────────────────────────────────────────────────
  - type: web
    name: justask-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: chmod +x render_build.sh && ./render_build.sh
    startCommand: gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: INFO
      - key: GROQ_API_KEY
        sync: false  # Must be set manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        fromDatabase:
          name: justask-db
          property: connectionURI
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PDF_DELETE_AFTER_PROCESSING
        value: "true"
      - key: CORS_ORIGINS
        value: '["https://justask-frontend.onrender.com"]'

  # ── Frontend Static Site ────────────────────────────────────────
  - type: web
    name: justask-frontend
    runtime: static
    rootDir: frontend/justask
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://justask-api.onrender.com/api/v1

# ── PostgreSQL Database ─────────────────────────────────────────
databases:
  - name: justask-db
    plan: free
    databaseName: justask
    user: justask_user
    region: oregon
